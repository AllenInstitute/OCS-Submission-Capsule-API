name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      # Per uv docs, set up Python with the official action, then install uv.
      # https://docs.astral.sh/uv/guides/integration/github/
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install project and dev dependencies (from lockfile)
        run: uv sync --extra dev --frozen

      - name: Check formatting (ruff format)
        run: uv run --frozen ruff format --check src tests

      - name: Lint (ruff check)
        run: uv run --frozen ruff check src tests

      - name: Run tests
        run: uv run --frozen pytest

      # mypy is advisory for now: the remaining findings are pandas DataFrame.at[...] typing
      # limitations, not runtime bugs. Tighten and make this blocking once those are addressed.
      - name: Type check (mypy, advisory)
        run: uv run --frozen mypy src
        continue-on-error: true
