name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Verify and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Fetch main for release validation
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Verify tag matches pyproject.toml and CHANGELOG
        run: >
          uv run --python 3.12 python scripts/check_release_version.py
          "${GITHUB_REF_NAME}" --require-ancestor-ref origin/main

      - name: Install project and dev dependencies (from lockfile)
        run: uv sync --extra dev --frozen

      - name: Verify installed package version
        run: |
          expected=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          actual=$(uv run python -c "from importlib.metadata import version; print(version('ocs-submission'))")
          test "$expected" = "$actual"

      - name: Run tests
        run: uv run --frozen pytest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="$(mktemp)"
          uv run --python 3.12 python scripts/check_release_version.py "${GITHUB_REF_NAME}" --notes > "$notes_file"
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "$notes_file"
